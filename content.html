<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keto Lebensmittel</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f4;
  --white: #ffffff;
  --border: #dde0db;
  --border-light: #eceeed;
  --text: #1e2320;
  --dim: #6b7569;
  --muted: #9ea89c;
  --green: #2d7a3a;
  --green-bg: #eaf4ec;
  --green-border: #b2d9b8;
  --gold: #8a6200;
  --gold-bg: #fdf6e3;
  --gold-border: #e8d48a;
  --header-bg: #2d7a3a;
  --row-alt: #f9faf8;
  --row-hover: #f0f5f1;
  --input-border: #c8cdc6;
  --input-focus: #2d7a3a;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 2px 12px rgba(0,0,0,0.10);
  --radius: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.header {
  background: var(--header-bg);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow-md);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; line-height: 1.2; }
.header-sub { font-size: 11px; opacity: 0.7; font-weight: 300; margin-top: 2px; }
.header-right { margin-left: auto; white-space: nowrap; font-size: 12px; opacity: 0.85; }
.header-right strong { font-size: 16px; font-weight: 700; }

/* ─── TAUGLICHKEIT TABS ─── */
.taug-bar {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.taug-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; margin-right: 2px; }
.taug-btn {
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; background: var(--white); color: var(--dim);
  transition: all 0.12s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.taug-btn:active { opacity: 0.75; }
.tb-active-all  { background: var(--text);  border-color: var(--text);  color: #fff !important; }
.tb-active-voll { background: var(--green); border-color: var(--green); color: #fff !important; }
.tb-active-bed  { background: var(--gold);  border-color: var(--gold);  color: #fff !important; }
.reset-btn {
  margin-left: auto;
  padding: 6px 14px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--white); color: var(--dim);
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.12s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.reset-btn:active { background: var(--bg); }

/* ─── CATEGORY BUTTONS ─── */
.cat-bar {
  background: #f0f3ef;
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-bar::-webkit-scrollbar { display: none; }
.cat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; flex-shrink: 0; margin-right: 2px; }
.cat-btn {
  padding: 5px 12px;
  border: 1px solid var(--border); border-radius: 4px;
  font-size: 11px; font-weight: 400;
  cursor: pointer; background: var(--white); color: var(--dim);
  transition: all 0.10s; white-space: nowrap; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-height: 32px;
}
.cat-btn:active { opacity: 0.7; }
.cat-active { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 700; }

/* ─── LAYOUT ─── */
.page-body {
  display: flex;
  align-items: flex-start;
  gap: 0;
}

/* ─── FILTER SIDEBAR (desktop) ─── */
.filter-panel {
  width: 200px;
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 14px 14px 20px;
  position: sticky;
  top: 110px; /* below header+taug */
  max-height: calc(100vh - 110px);
  overflow-y: auto;
}
.filter-panel-title {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px;
}
.fp-row {
  margin-bottom: 10px;
}
.fp-label {
  display: block;
  font-size: 10px; color: var(--dim); font-weight: 700;
  letter-spacing: 0.5px; margin-bottom: 3px;
}
.fp-input, .fp-select {
  width: 100%;
  border: 1px solid var(--input-border);
  border-radius: 4px;
  padding: 7px 9px;
  font-size: 13px;
  font-family: 'Lato', sans-serif;
  background: var(--white);
  color: var(--text);
  outline: none;
  transition: border-color 0.12s;
  -webkit-appearance: none;
  min-height: 38px;
}
.fp-input:focus, .fp-select:focus { border-color: var(--input-focus); box-shadow: 0 0 0 2px rgba(45,122,58,0.12); }
.fp-input.active, .fp-select.active { border-color: var(--input-focus); background: var(--green-bg); }
.fp-input[type=number] { font-family: 'Source Code Pro', monospace; }

/* ─── MOBILE FILTER (horizontal stacked) ─── */
.filter-mobile {
  display: none;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 10px 14px;
}
.filter-mobile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.filter-mobile-grid .fp-row { margin-bottom: 0; }
.filter-mobile-grid .fp-row:first-child { grid-column: 1 / -1; }

/* ─── CONTENT AREA ─── */
.content {
  flex: 1;
  min-width: 0;
  padding: 16px;
}

/* ─── DESKTOP TABLE ─── */
.table-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.table-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; z-index: 5; }
thead tr.col-label th {
  background: var(--header-bg); color: #fff;
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  padding: 9px 10px; text-align: right;
  cursor: pointer; user-select: none; white-space: nowrap;
  transition: background 0.1s;
}
thead tr.col-label th:first-child { text-align: left; }
thead tr.col-label th:nth-child(2) { text-align: left; min-width: 140px; }
thead tr.col-label th:hover { background: #246231; }
thead tr.col-label th.sorted { background: #1a4d26; }
.sort-icon { margin-left: 3px; font-size: 9px; opacity: 0.6; }
th.sorted .sort-icon { opacity: 1; }

tr.group-sep td {
  background: #f0f2ef; color: var(--dim);
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 7px 10px 5px;
  border-top: 2px solid var(--border);
  border-bottom: 1px solid var(--border-light);
}
tr.group-sep:first-child td { border-top: none; }

tbody tr.data-row { border-bottom: 1px solid var(--border-light); transition: background 0.08s; }
tbody tr.data-row:hover { background: var(--row-hover); }
tbody tr.data-row:nth-child(even) { background: var(--row-alt); }
tbody tr.data-row:nth-child(even):hover { background: var(--row-hover); }

tbody td {
  padding: 7px 10px; text-align: right;
  font-family: 'Source Code Pro', monospace;
  font-size: 12px; color: var(--dim); white-space: nowrap;
}
tbody td:first-child {
  text-align: left; font-family: 'Lato', sans-serif;
  font-size: 13px; color: var(--text); font-weight: 400; min-width: 160px;
}
tbody td:nth-child(2) { text-align: left; }
tbody td.hi { color: var(--green); font-weight: 600; }

/* ─── BADGE ─── */
.badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 3px; white-space: nowrap;
}
.badge-v { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge-b { background: var(--gold-bg);  color: var(--gold);  border: 1px solid var(--gold-border); }

/* ─── MOBILE CARDS ─── */
.cards-view { display: none; }
.group-card-head {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--dim);
  padding: 12px 4px 6px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 8px;
  display: flex; justify-content: space-between;
}
.group-card-head span { font-weight: 400; letter-spacing: 0; }

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}
.card-top {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 8px; margin-bottom: 10px;
}
.card-name {
  font-size: 14px; font-weight: 700; color: var(--text);
  line-height: 1.3; flex: 1;
}
.card-nums {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.card-num {
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: 5px;
  padding: 6px 8px;
  text-align: center;
}
.card-num-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--muted);
  display: block; margin-bottom: 2px;
}
.card-num-val {
  font-family: 'Source Code Pro', monospace;
  font-size: 14px; font-weight: 600; color: var(--text);
  display: block;
}
.card-num-val.hi { color: var(--green); }

/* ─── EMPTY ─── */
.empty { padding: 50px; text-align: center; color: var(--muted); font-size: 14px; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #f0f2ef; }
::-webkit-scrollbar-thumb { background: #c5ccc3; border-radius: 3px; }

/* ══════════════════════════════════
   RESPONSIVE BREAKPOINT ≤ 768px
══════════════════════════════════ */
@media (max-width: 768px) {
  .header h1 { font-size: 16px; }
  .header-sub { display: none; }

  /* Hide desktop filter sidebar */
  .filter-panel { display: none; }

  /* Show mobile filter */
  .filter-mobile { display: block; }

  /* Cards instead of table */
  .table-wrap { display: none; }
  .cards-view { display: block; }

  /* Content full width, no padding fighting */
  .content { padding: 10px 12px; }

  /* Category bar: scrollable pills */
  .cat-bar { padding: 8px 12px; }

  /* Larger touch targets */
  .taug-btn { padding: 8px 14px; font-size: 12px; min-height: 36px; }
  .cat-btn  { min-height: 34px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header h1" style="font-size:18px;font-weight:700">Keto Lebensmittel</div>
    <div class="header-sub">SKD · 20–25 g Netto-KH/Tag · je 100 g · BLS/USDA</div>
  </div>
  <div class="header-right"><strong id="cnt">—</strong> Einträge</div>
</div>

<!-- TAUGLICHKEIT -->
<div class="taug-bar">

  <button class="taug-btn"               id="tb-voll" onclick="setTaug('voll')">✅ Keto</button>
  <button class="taug-btn"               id="tb-bed"  onclick="setTaug('bedingt')">🟡 Bedingt</button>
  <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
</div>

<!-- CATEGORIES (horizontal scroll on mobile) -->
<div class="cat-bar">
  <span class="cat-label">Kategorie</span>
  <button class="cat-btn cat-active" id="cat-all" onclick="setCat('')">Alle</button>
</div>

<!-- MOBILE FILTERS (always visible, stacked grid) -->
<div class="filter-mobile">

    <div class="fp-row">

      <input class="fp-input" id="mf0" type="text" placeholder="Name …" oninput="syncFilter(0,this.value);render()">
    </div>
    <div class="fp-row">
      <label class="fp-label">Tauglichkeit</label>
      <select class="fp-select" id="mf1" onchange="syncFilter(1,this.value);render()">
        <option value="">— alle —</option>
        <option value="voll">Keto-tauglich</option>
        <option value="bedingt">Bedingt</option>
      </select>
    </div>
    <div class="fp-row">
      <label class="fp-label">kcal &lt;</label>
      <input class="fp-input" id="mf2" type="number" min="0" placeholder="z.B. 200" oninput="syncFilter(2,this.value);render()">
    </div>
    <div class="fp-row">
      <label class="fp-label">KH ges. g &lt;</label>
      <input class="fp-input" id="mf3" type="number" min="0" placeholder="z.B. 5" oninput="syncFilter(3,this.value);render()">
    </div>
    <div class="fp-row">
      <label class="fp-label">Netto-KH g &lt;</label>
      <input class="fp-input" id="mf4" type="number" min="0" placeholder="z.B. 3" oninput="syncFilter(4,this.value);render()">
    </div>
    <div class="fp-row">
      <label class="fp-label">Protein g &lt;</label>
      <input class="fp-input" id="mf5" type="number" min="0" placeholder="z.B. 20" oninput="syncFilter(5,this.value);render()">
    </div>
    <div class="fp-row">
      <label class="fp-label">Fett g &lt;</label>
      <input class="fp-input" id="mf6" type="number" min="0" placeholder="z.B. 10" oninput="syncFilter(6,this.value);render()">
    </div>
  </div>
</div>

<!-- PAGE BODY -->
<div class="page-body">

  <!-- DESKTOP FILTER SIDEBAR -->
  <div class="filter-panel">
    <div class="filter-panel-title">Filter &lt; Wert</div>

    <div class="fp-row">
      <label class="fp-label">Name</label>
      <input class="fp-input" id="f0" type="text" placeholder="Name …" oninput="syncFilter(0,this.value);render()">
    </div>

      </select>
    </div>
    <div class="fp-row">
      <label class="fp-label">kcal &lt;</label>
      <input class="fp-input" id="f2" type="number" min="0" placeholder="z.B. 200" oninput="syncFilter(2,this.value);render()">
    </div>

      <label class="fp-label">KH gesamt g &lt;</label>
      <input class="fp-input" id="f3" type="number" min="0" placeholder="z.B. 5" oninput="syncFilter(3,this.value);render()">

      <label class="fp-label">Netto-KH g &lt;</label>
      <input class="fp-input" id="f4" type="number" min="0" placeholder="z.B. 3" oninput="syncFilter(4,this.value);render()">
    </div>
    <div class="fp-row">
      <label class="fp-label">Protein g &lt;</label>
      <input class="fp-input" id="f5" type="number" min="0" placeholder="z.B. 20" oninput="syncFilter(5,this.value);render()">
    </div>
    <div class="fp-row">
      <label class="fp-label">Fett g &lt;</label>
      <input class="fp-input" id="f6" type="number" min="0" placeholder="z.B. 10" oninput="syncFilter(6,this.value);render()">
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DESKTOP TABLE -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr class="col-label">
              <th onclick="sortBy(0)">Lebensmittel <span class="sort-icon" id="si0">⇅</span></th>
              <th onclick="sortBy(1)">Tauglichkeit <span class="sort-icon" id="si1">⇅</span></th>

            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- MOBILE CARDS -->
    <div class="cards-view" id="cards-view"></div>

  </div><!-- /content -->
</div><!-- /page-body -->

function syncFilter(idx, val) {
  filterVals[idx] = val.trim();
  // Sync desktop ↔ mobile
  const desk = document.getElementById('f'+idx);
  const mob  = document.getElementById('mf'+idx);
  if (desk && desk.value !== val) desk.value = val;
  if (mob  && mob.value  !== val) mob.value  = val;
  // Active class
  if (desk) desk.classList.toggle('active', !!filterVals[idx]);
  if (mob)  mob.classList.toggle('active',  !!filterVals[idx]);
}

function syncTaugFilter(val) {
  // desktop select changed
  filterVals[1] = val;
  const mob = document.getElementById('mf1');
  if (mob) mob.value = val;
  document.getElementById('mf1').classList.toggle('active', !!val);
  document.getElementById('f1').classList.toggle('active', !!val);
  // Sync tab buttons
  activeTabTaug = val || 'all';
  updateTaugBtns();
  render();
}

function setTaug(t) {
  activeTabTaug = t;
  const v = t === 'all' ? '' : t;
  filterVals[1] = v;
  const d = document.getElementById('f1');
  const m = document.getElementById('mf1');
  if (d) { d.value = v; d.classList.toggle('active', !!v); }
  if (m) { m.value = v; m.classList.toggle('active', !!v); }
  updateTaugBtns();
  render();
}

function updateTaugBtns() {
  document.getElementById('tb-all').className  = 'taug-btn' + (activeTabTaug==='all'     ? ' tb-active-all'  : '');
  document.getElementById('tb-voll').className = 'taug-btn' + (activeTabTaug==='voll'    ? ' tb-active-voll' : '');
  document.getElementById('tb-bed').className  = 'taug-btn' + (activeTabTaug==='bedingt' ? ' tb-active-bed'  : '');
}

function setCat(g) {
  activeCat = g;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('cat-active',
      g === '' ? b.id === 'cat-all' : b.textContent === g);
  });
  render();
}

function passes(row) {
  const [name, taug, kcal, kh, netto, prot, fett, gruppe] = row;
  if (filterVals[0] && !name.toLowerCase().includes(filterVals[0].toLowerCase())) return false;
  if (filterVals[1] && taug !== filterVals[1]) return false;
  const nums = [kcal, kh, netto, prot, fett];
  for (let i=0; i<5; i++) {
    const v = filterVals[i+2];
    if (v !== '') {
      const lim = parseFloat(v);
      if (!isNaN(lim) && nums[i] >= lim) return false;
    }
  }
  if (activeCat && gruppe !== activeCat) return false;
  return true;
}

function fmt(v) {
  if (v === 0) return '0';
  return Number.isInteger(v) ? String(v) : v.toFixed(1);
}

function render() {
  let rows = RAW.filter(passes);

  if (sortCol !== null) {
    rows.sort((a,b) => {
      let av, bv;
      if (sortCol===0) { av=a[0]; bv=b[0]; }
      else if (sortCol===1) { av=a[1]; bv=b[1]; }
      else { const m=[,,2,3,4,5,6]; av=a[m[sortCol]]; bv=b[m[sortCol]]; }
      if (typeof av==='string') return sortDir * av.localeCompare(bv,'de');
      return sortDir * (av-bv);
    });
  }

  document.getElementById('cnt').textContent = rows.length;

  // Group
  const grouped = {}, groupOrder = [];
  for (const r of rows) {
    if (!grouped[r[7]]) { grouped[r[7]]=[]; groupOrder.push(r[7]); }
    grouped[r[7]].push(r);
  }

  const numActive = [2,3,4,5,6].map(i => filterVals[i] !== '');

  if (!rows.length) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="empty">Keine Einträge gefunden.</td></tr>';
    document.getElementById('cards-view').innerHTML = '<div class="empty">Keine Einträge gefunden.</div>';
    return;
  }

  // ── DESKTOP TABLE ──
  let thtml = '';
  for (const grp of groupOrder) {
    thtml += `<tr class="group-sep"><td colspan="7">${grp} <span style="font-weight:400;letter-spacing:0">(${grouped[grp].length})</span></td></tr>`;
    for (const r of grouped[grp]) {
      const [name,taug,kcal,kh,netto,prot,fett] = r;
      const badge = taug==='voll'
        ? '<span class="badge badge-v">Keto-tauglich</span>'
        : '<span class="badge badge-b">Bedingt</span>';
      thtml += `<tr class="data-row">
        <td>${name}</td><td>${badge}</td>
        <td class="${numActive[0]?'hi':''}">${fmt(kcal)}</td>
        <td class="${numActive[1]?'hi':''}">${fmt(kh)}</td>
        <td class="${numActive[2]?'hi':''}">${fmt(netto)}</td>
        <td class="${numActive[3]?'hi':''}">${fmt(prot)}</td>
        <td class="${numActive[4]?'hi':''}">${fmt(fett)}</td>
      </tr>`;
    }
  }
  document.getElementById('tbody').innerHTML = thtml;

  // ── MOBILE CARDS ──
  let chtml = '';
  for (const grp of groupOrder) {
    chtml += `<div class="group-card-head">${grp} <span>${grouped[grp].length} Einträge</span></div>`;
    for (const r of grouped[grp]) {
      const [name,taug,kcal,kh,netto,prot,fett] = r;
      const badge = taug==='voll'
        ? '<span class="badge badge-v">✅ Keto-tauglich</span>'
        : '<span class="badge badge-b">🟡 Bedingt</span>';
      chtml += `<div class="card">
        <div class="card-top">
          <div class="card-name">${name}</div>
          ${badge}
        </div>
        <div class="card-nums">
          <div class="card-num">
            <span class="card-num-label">kcal</span>
            <span class="card-num-val ${numActive[0]?'hi':''}">${fmt(kcal)}</span>
          </div>
          <div class="card-num">
            <span class="card-num-label">KH ges.</span>
            <span class="card-num-val ${numActive[1]?'hi':''}">${fmt(kh)} g</span>
          </div>
          <div class="card-num">
            <span class="card-num-label">Netto-KH</span>
            <span class="card-num-val ${numActive[2]?'hi':''}">${fmt(netto)} g</span>
          </div>
          <div class="card-num">
            <span class="card-num-label">Protein</span>
            <span class="card-num-val ${numActive[3]?'hi':''}">${fmt(prot)} g</span>
          </div>
          <div class="card-num">
            <span class="card-num-label">Fett</span>
            <span class="card-num-val ${numActive[4]?'hi':''}">${fmt(fett)} g</span>
          </div>
        </div>
      </div>`;
    }
  }
  document.getElementById('cards-view').innerHTML = chtml;
}

function sortBy(col) {
  for (let i=0;i<7;i++) {
    const el=document.getElementById('si'+i);
    if(el){el.textContent='⇅'; el.parentElement.classList.remove('sorted');}
  }
  sortDir = sortCol===col ? sortDir*-1 : 1;
  sortCol = col;
  const icon=document.getElementById('si'+col);
  if(icon){icon.textContent=sortDir>0?'↑':'↓'; icon.parentElement.classList.add('sorted');}
  render();
}

function resetAll() {
  for (let i=0;i<7;i++) filterVals[i]='';
  ['f0','f2','f3','f4','f5','f6','mf0','mf2','mf3','mf4','mf5','mf6'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.value=''; el.classList.remove('active');}
  });
  ['f1','mf1'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.value=''; el.classList.remove('active');}
  });
  activeTabTaug='all'; activeCat='';
  updateTaugBtns();
  setCat('');
  sortCol=null; sortDir=1;
  for(let i=0;i<7;i++){
    const el=document.getElementById('si'+i);
    if(el){el.textContent='⇅'; el.parentElement.classList.remove('sorted');}
  }
  render();
}

render();
</script>
</body>
</html>
