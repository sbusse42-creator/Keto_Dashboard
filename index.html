<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keto Lebensmittel Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f4;
  --white: #ffffff;
  --border: #dde0db;
  --border-light: #eceeed;
  --text: #1e2320;
  --dim: #6b7569;
  --muted: #9ea89c;
  --green: #2d7a3a;
  --green-bg: #eaf4ec;
  --green-border: #b2d9b8;
  --gold: #8a6200;
  --gold-bg: #fdf6e3;
  --gold-border: #e8d48a;
  --header-bg: #2d7a3a;
  --header-text: #ffffff;
  --row-alt: #f9faf8;
  --row-hover: #f0f5f1;
  --input-bg: #ffffff;
  --input-border: #c8cdc6;
  --input-focus: #2d7a3a;
  --sort-active: #2d7a3a;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 2px 12px rgba(0,0,0,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  font-weight: 400;
  font-size: 14px;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  box-shadow: var(--shadow-md);
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.header-sub {
  font-size: 12px;
  opacity: 0.75;
  font-weight: 300;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}
.count-info {
  font-size: 13px;
  opacity: 0.85;
}
.count-info strong {
  font-size: 18px;
  font-weight: 700;
  opacity: 1;
}

/* ── CONTROLS BAR ── */
.controls {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.ctrl-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
}

/* Tab buttons */
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  background: var(--white);
  color: var(--dim);
  transition: all 0.12s;
  letter-spacing: 0.3px;
}
.tab.active-all  { background: var(--text); border-color: var(--text); color: #fff; }
.tab.active-voll { background: var(--green); border-color: var(--green); color: #fff; }
.tab.active-bed  { background: var(--gold); border-color: var(--gold); color: #fff; }
.tab:hover:not([class*="active"]) { border-color: var(--dim); color: var(--text); }

/* Group filter */
.group-filter-wrap {
  display: flex; align-items: center; gap: 6px;
}
.group-select {
  border: 1px solid var(--input-border);
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 12px;
  font-family: 'Lato', sans-serif;
  background: var(--white);
  color: var(--text);
  cursor: pointer;
  outline: none;
  min-width: 200px;
}
.group-select:focus { border-color: var(--input-focus); }

.reset-btn {
  margin-left: auto;
  padding: 5px 16px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--white);
  color: var(--dim);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.12s;
}
.reset-btn:hover { border-color: var(--text); color: var(--text); }

/* ── MAIN ── */
main {
  padding: 20px 32px 40px;
}

/* ── TABLE WRAPPER ── */
.table-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

/* Fixed header */
.table-scroll {
  overflow-x: auto;
  max-height: calc(100vh - 220px);
  overflow-y: auto;
}

/* Sticky thead */
thead {
  position: sticky;
  top: 0;
  z-index: 10;
}

/* Group header row */
thead tr.group-row th {
  background: #f0f2ef;
  color: var(--dim);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 10px 6px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

/* Column label row */
thead tr.col-label th {
  background: var(--header-bg);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 8px 10px;
  text-align: right;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: background 0.1s;
}
thead tr.col-label th:first-child { text-align: left; }
thead tr.col-label th:hover { background: #246231; }
thead tr.col-label th.sorted { background: #1a4d26; }
.sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.7; }
th.sorted .sort-icon { opacity: 1; }

/* Filter row */
thead tr.filter-row th {
  background: #f7f9f7;
  border-bottom: 2px solid var(--border);
  padding: 5px 6px;
}
thead tr.filter-row th:first-child { padding-left: 10px; }

.filter-input {
  width: 100%;
  border: 1px solid var(--input-border);
  border-radius: 3px;
  padding: 4px 7px;
  font-size: 12px;
  font-family: 'Source Code Pro', monospace;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.filter-input:focus {
  border-color: var(--input-focus);
  box-shadow: 0 0 0 2px rgba(45,122,58,0.15);
}
.filter-input.active {
  border-color: var(--input-focus);
  background: var(--green-bg);
}
.filter-input[data-type="text"] { text-align: left; }
.filter-input[data-type="num"]  { text-align: right; }

/* Group separator row */
tr.group-sep td {
  background: #f0f2ef;
  color: var(--dim);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 10px 5px;
  border-top: 2px solid var(--border);
  border-bottom: 1px solid var(--border-light);
}
tr.group-sep:first-child td { border-top: none; }

/* Data rows */
tbody tr.data-row { border-bottom: 1px solid var(--border-light); transition: background 0.08s; }
tbody tr.data-row:hover { background: var(--row-hover); }
tbody tr.data-row:nth-child(even) { background: var(--row-alt); }
tbody tr.data-row:nth-child(even):hover { background: var(--row-hover); }

tbody td {
  padding: 6px 10px;
  text-align: right;
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--dim);
  white-space: nowrap;
}
tbody td:first-child {
  text-align: left;
  font-family: 'Lato', sans-serif;
  font-size: 13px;
  color: var(--text);
  font-weight: 400;
  min-width: 180px;
}
tbody td:nth-child(2) {
  min-width: 110px;
}
tbody td.hi { color: var(--green); font-weight: 600; }

/* Tauglichkeit badge */
.badge {
  display: inline-block;
  font-family: 'Lato', sans-serif;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.badge-v {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid var(--green-border);
}
.badge-b {
  background: var(--gold-bg);
  color: var(--gold);
  border: 1px solid var(--gold-border);
}

/* Empty state */
.empty {
  padding: 60px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #f0f2ef; }
::-webkit-scrollbar-thumb { background: #c5ccc3; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a0a89e; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Keto Lebensmittel</h1>
    <div class="header-sub">Standard Keto (SKD) · 20–25 g Netto-KH/Tag · Nährwerte je 100 g · Quelle: BLS/USDA</div>
  </div>
  <div class="header-right">
    <div class="count-info"><strong id="cnt">—</strong> Einträge</div>
  </div>
</div>

<div class="controls">
  <span class="ctrl-label">Anzeige</span>
  <div class="tabs">
    <div class="tab active-all"  onclick="setTab('all',this)">Alle</div>
    <div class="tab" onclick="setTab('voll',this)">✅ Keto-tauglich</div>
    <div class="tab" onclick="setTab('bedingt',this)">🟡 Bedingt keto-tauglich</div>
  </div>
  <div class="group-filter-wrap">
    <span class="ctrl-label">Gruppe</span>
    <select class="group-select" id="group-select" onchange="render()">
      <option value="">Alle Gruppen</option>
    </select>
  </div>
  <button class="reset-btn" onclick="resetAll()">↺ Zurücksetzen</button>
</div>

<main>
  <div class="table-wrap">
    <div class="table-scroll">
      <table id="main-table">
        <thead>
          <tr class="col-label">
            <th onclick="sortBy(0)">Lebensmittel <span class="sort-icon" id="si0">⇅</span></th>
            <th onclick="sortBy(1)">Tauglichkeit <span class="sort-icon" id="si1">⇅</span></th>
            <th onclick="sortBy(2)">kcal <span class="sort-icon" id="si2">⇅</span></th>
            <th onclick="sortBy(3)">KH gesamt g <span class="sort-icon" id="si3">⇅</span></th>
            <th onclick="sortBy(4)">KH netto g <span class="sort-icon" id="si4">⇅</span></th>
            <th onclick="sortBy(5)">Protein g <span class="sort-icon" id="si5">⇅</span></th>
            <th onclick="sortBy(6)">Fett g <span class="sort-icon" id="si6">⇅</span></th>
          </tr>
          <tr class="filter-row">
            <th><input class="filter-input" data-type="text" id="f0" placeholder="Name …" oninput="render()"></th>
            <th><input class="filter-input" data-type="text" id="f1" placeholder="keto / bedingt …" oninput="render()"></th>
            <th><input class="filter-input" data-type="num"  id="f2" placeholder="&lt; kcal" type="number" min="0" oninput="render()"></th>
            <th><input class="filter-input" data-type="num"  id="f3" placeholder="&lt; KH g" type="number" min="0" oninput="render()"></th>
            <th><input class="filter-input" data-type="num"  id="f4" placeholder="&lt; netto g" type="number" min="0" oninput="render()"></th>
            <th><input class="filter-input" data-type="num"  id="f5" placeholder="&lt; Prot g" type="number" min="0" oninput="render()"></th>
            <th><input class="filter-input" data-type="num"  id="f6" placeholder="&lt; Fett g" type="number" min="0" oninput="render()"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

// Default sort: KH gesamt asc (idx 3), then kcal asc (idx 2)
RAW.sort((a,b) => a[3]-b[3] || a[2]-b[2]);

let activeTab = 'all';
let sortCol = null, sortDir = 1;

// Populate group select
const groups = [...new Set(RAW.map(r=>r[7]))].sort();
const sel = document.getElementById('group-select');
groups.forEach(g => {
  const o = document.createElement('option');
  o.value = g; o.textContent = g;
  sel.appendChild(o);
});

function getFilters() {
  return [0,1,2,3,4,5,6].map(i => {
    const el = document.getElementById('f'+i);
    return { val: el.value.trim(), type: el.dataset.type };
  });
}

function passes(row, filters) {
  const [name, taug, kcal, kh, netto, prot, fett, gruppe] = row;
  const vals = [name, taug==='voll'?'ketotauglich':'bedingt ketotauglich', kcal, kh, netto, prot, fett];
  for (let i=0; i<filters.length; i++) {
    const f = filters[i];
    if (!f.val) continue;
    if (f.type === 'text') {
      if (!String(vals[i]).toLowerCase().includes(f.val.toLowerCase())) return false;
    } else {
      const limit = parseFloat(f.val);
      if (!isNaN(limit) && vals[i] >= limit) return false;
    }
  }
  if (activeTab === 'voll' && taug !== 'voll') return false;
  if (activeTab === 'bedingt' && taug !== 'bedingt') return false;
  const grpFilter = document.getElementById('group-select').value;
  if (grpFilter && gruppe !== grpFilter) return false;
  return true;
}

function fmt(v) {
  if (v === 0) return '0';
  if (Number.isInteger(v)) return v;
  return v.toFixed(1);
}

function render() {
  const filters = getFilters();
  // Update active state on inputs
  filters.forEach((f,i) => {
    document.getElementById('f'+i).classList.toggle('active', !!f.val);
  });

  let rows = RAW.filter(r => passes(r, filters));

  // Sort
  if (sortCol !== null) {
    const colMap = [0,1,2,3,4,5,6]; // maps th index to data index (adjusted)
    rows.sort((a,b) => {
      let av, bv;
      if (sortCol === 0) { av = a[0]; bv = b[0]; }
      else if (sortCol === 1) { av = a[1]; bv = b[1]; }
      else { av = [,, a[2],a[3],a[4],a[5],a[6]][sortCol]; bv = [,,b[2],b[3],b[4],b[5],b[6]][sortCol]; }
      if (typeof av === 'string') return sortDir * av.localeCompare(bv, 'de');
      return sortDir * (av - bv);
    });
  }

  document.getElementById('cnt').textContent = rows.length;

  // Group rows
  const grouped = {};
  const groupOrder = [];
  for (const r of rows) {
    if (!grouped[r[7]]) { grouped[r[7]] = []; groupOrder.push(r[7]); }
    grouped[r[7]].push(r);
  }

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Keine Einträge gefunden.</td></tr>';
    return;
  }

  let html = '';
  for (const grp of groupOrder) {
    html += `<tr class="group-sep"><td colspan="7">${grp} <span style="font-weight:400;letter-spacing:0">(${grouped[grp].length})</span></td></tr>`;
    grouped[grp].forEach((r, i) => {
      const [name, taug, kcal, kh, netto, prot, fett] = r;
      const badge = taug === 'voll'
        ? '<span class="badge badge-v">Keto-tauglich</span>'
        : '<span class="badge badge-b">Bedingt keto-tauglich</span>';
      const hiCols = filters.slice(2).map((f,fi) => f.val ? 'hi' : '');
      html += `<tr class="data-row">
        <td>${name}</td>
        <td>${badge}</td>
        <td class="${hiCols[0]}">${fmt(kcal)}</td>
        <td class="${hiCols[1]}">${fmt(kh)}</td>
        <td class="${hiCols[2]}">${fmt(netto)}</td>
        <td class="${hiCols[3]}">${fmt(prot)}</td>
        <td class="${hiCols[4]}">${fmt(fett)}</td>
      </tr>`;
    });
  }
  tbody.innerHTML = html;
}

function sortBy(col) {
  // Update icons
  for (let i=0;i<7;i++) {
    const el = document.getElementById('si'+i);
    if (el) { el.textContent = '⇅'; document.querySelector(`#si${i}`).parentElement.classList.remove('sorted'); }
  }
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  const icon = document.getElementById('si'+col);
  if (icon) {
    icon.textContent = sortDir > 0 ? '↑' : '↓';
    icon.parentElement.classList.add('sorted');
  }
  render();
}

function setTab(t, el) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(x => {
    x.className = 'tab';
  });
  if (t==='all') el.className = 'tab active-all';
  else if (t==='voll') el.className = 'tab active-voll';
  else el.className = 'tab active-bed';
  render();
}

function resetAll() {
  for (let i=0;i<7;i++) {
    const el = document.getElementById('f'+i);
    if (el) { el.value=''; el.classList.remove('active'); }
  }
  document.getElementById('group-select').value = '';
  activeTab = 'all';
  document.querySelectorAll('.tab').forEach((x,i)=>{ x.className='tab'; if(i===0) x.className='tab active-all'; });
  sortCol = null; sortDir = 1;
  for (let i=0;i<7;i++) {
    const el = document.getElementById('si'+i);
    if (el) { el.textContent='⇅'; el.parentElement.classList.remove('sorted'); }
  }
  render();
}

render();
</script>
</body>
</html>
